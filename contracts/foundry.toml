[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
bytecode_hash = "none"
cbor_metadata = false
gas_reports = ["SetCodeRegistry"]
fs_permissions = [{ access = "read", path = "./out" }]

[fuzz]
runs = 1000

[invariant]
runs = 1000
depth = 50
fail_on_revert = true
call_override = false

[profile.ci]
verbosity = 3
fuzz = { runs = 10000 }
invariant = { runs = 1000, depth = 50, fail_on_revert = true }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
